name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          output="dist/guardrail-serve-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags="-s -w" -o "${output}" ./cmd/guardrail-serve

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardrail-serve-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
