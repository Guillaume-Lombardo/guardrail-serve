patterns:
  - name: generic patterns
    regex: '(?i)\b(password|passwd|pwd|mot de passe|mdp)\b\s*[:=]\s*(?P<secret>[^\s,;]+)'
  - name: generic patterns
    regex: '(?i)\b(api[_ -]?key|(access[_ -]?)?token|secret([_ -]key)?)\b\s*[:=]\s*(?P<secret>[^\s,;]+)'
  - name: generic patterns
    regex: "(?i)\\b(api[_ -]?key|(access[_ -]?)?token|secret([_ -]key)?)\\b\\s*[:=]\\s*['\"]?(?P<secret>[^'\"\\s,;]+)['\"]?"
  - name: generic patterns
    regex: '(?i)(?:\blogin\b\s*[:=]\s*(?P<login>[^\s,;]+)\s+)?\b(password|passwd|pwd)\b\s*[:=]\s*(?P<secret>[^\s,;]+)'
  - name: sk-key patterns
    regex: '(?i)(?P<secret>sk-[a-z0-9-]{8,})'
  - name: AWS patterns
    regex: '(?P<secret>AKIA[0-9A-Z]{16})'
  - name: AWS patterns
    regex: '(?i)\baws(.{0,20})?(secret|key)\b.{0,10}(?P<secret>[A-Za-z0-9/+=]{40})'
  - name: github patterns
    regex: '(?i)(?P<secret>gh[pousr]_[A-Za-z0-9]{36,})'
  - name: slack pattern
    regex: '(?P<secret>xox[baprs]-[A-Za-z0-9-]{10,})'
  - name: stripe patterns
    regex: '(?P<secret>sk_live_[0-9a-zA-Z]{24,})'
  - name: google patterns
    regex: '(?P<secret>AIza[0-9A-Za-z\-_]{35})'
  - name: JWT patterns
    regex: '(?P<secret>eyJ[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+)'
  - name: long suspect strings patterns
    regex: '(?P<secret>[A-Za-z0-9_\-]{32,})'
  - name: base64-like suspect patterns
    regex: '(?P<secret>[A-Za-z0-9+/]{48,}={0,2})'
  - name: hex patterns
    regex: '(?P<secret>[a-f0-9]{48,})'
  - name: URL patterns
    regex: '(?i)://(?P<login>[^:\s]+):(?P<secret>[^@\s]+)@'
  - name: http(s) header authorisation pattern
    regex: '(?i)\bauthorization\b\s*:\s*(?P<secret>bearer\s+[^\s,;]+)'
