patterns:
  - name: ignore_instructions
    regex: '(?i)\b(ignore|disregard|override)\b.{0,40}\b(previous|prior|above|system|developer)\b.{0,40}\b(instructions?|prompt)\b'
  - name: reveal_prompt
    regex: '(?i)\b(reveal|show|print|dump|display)\b.{0,40}\b(system|developer|hidden)\b.{0,20}\b(prompt|instructions?)\b'
  - name: bypass_safety
    regex: '(?i)\b(bypass|disable|ignore)\b.{0,30}\b(safety|guardrails?|restrictions?|filters?)\b'
  - name: tool_exfiltration
    regex: '(?i)\b(show|list|dump|print)\b.{0,30}\b(tools?|functions?|schemas?)\b'
  - name: role_override
    regex: '(?i)\byou are now\b.{0,40}\b(system|developer|root|admin)\b'
